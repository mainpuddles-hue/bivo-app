<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>TackBird v3 — hi-fi mockups</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,600;12..96,700&family=Instrument+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="tokens.css"/>
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #ECEEF0; font-family: 'Instrument Sans', system-ui, sans-serif; color: #1A1D1F; -webkit-font-smoothing: antialiased; }
  #root { height: 100%; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="primitives.jsx"></script>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="phone-frame.jsx"></script>
<script type="text/babel" src="seed-v3.jsx"></script>
<script type="text/babel" src="screen-feed-v3.jsx"></script>
<script type="text/babel" src="screen-detail-v3.jsx"></script>
<script type="text/babel" src="screen-create-v3.jsx"></script>
<script type="text/babel" src="edge-cases.jsx"></script>

<script type="text/babel" data-presets="env,react">
  /* global React, ReactDOM, PhoneFrame, DesignCanvas, DCSection, DCArtboard, DCPostIt,
     FeedV3, PostDetailV3, CreateV3, SkeletonFeed, NoNetworkFeed, EmptyFeed, NoImageCard,
     PHONE_W, PHONE_H */

  const FW = PHONE_W + 22;
  const FH = PHONE_H + 22;

  function App() {
    return (
      <DesignCanvas>

        <DCSection id="hero"
          title="Feed · Post Detail · Create"
          subtitle="Helsinki Monochrome · iPhone 15 Pro · Bricolage Grotesque + Instrument Sans · realistinen suomi-sisältö">

          <DCArtboard id="feed-v3" label="Feed" width={FW} height={FH}>
            <PhoneFrame><FeedV3 active="feed"/></PhoneFrame>
          </DCArtboard>

          <DCArtboard id="detail-v3" label="Ilmoitus · Bosch" width={FW} height={FH}>
            <PhoneFrame><PostDetailV3/></PhoneFrame>
          </DCArtboard>

          <DCArtboard id="create-v3" label="Uusi ilmoitus" width={FW} height={FH}>
            <PhoneFrame><CreateV3/></PhoneFrame>
          </DCArtboard>

          <DCPostIt x={20} y={40} color="yellow">
            <strong>Typografia kantaa</strong>
            Bricolage Grotesque (display, 500/600 weight) otsikoissa,
            Instrument Sans body. Tabular nums kaikkialla numero-sisällössä.
          </DCPostIt>

          <DCPostIt x={20} y={140} color="pink">
            <strong>Kortti-rytmi</strong>
            Kolme varianttia: IMAGE (4:5 photo), INK (musta tapahtumakortti),
            TINT (warm-tint text-only). Vältellään yksitoikkoisuutta.
          </DCPostIt>

          <DCPostIt x={20} y={240} color="blue">
            <strong>Realistinen sisältö</strong>
            Vaasankatu, Sturenkatu, Brahenkenttä, Reima 110, Moccamaster.
            Aitoja Helsinki-nimiä joihin Kallion asukas voi samaistua.
          </DCPostIt>
        </DCSection>


        <DCSection id="filtered"
          title="Variantit & dark mode"
          subtitle="Sama Feed eri tiloissa.">

          <DCArtboard id="feed-filtered" label="Feed · suodatettu" width={FW} height={FH}>
            <PhoneFrame>
              <FeedV3Demo filter="lainaa"/>
            </PhoneFrame>
          </DCArtboard>

          <DCArtboard id="feed-dark" label="Feed · tumma" width={FW} height={FH}>
            <div data-theme="dark" style={{height: "100%"}}>
              <PhoneFrame dark screenBackground="#0E1011"><FeedV3 active="feed"/></PhoneFrame>
            </div>
          </DCArtboard>

          <DCArtboard id="detail-dark" label="Ilmoitus · tumma" width={FW} height={FH}>
            <div data-theme="dark" style={{height: "100%"}}>
              <PhoneFrame dark screenBackground="#0E1011"><PostDetailV3/></PhoneFrame>
            </div>
          </DCArtboard>
        </DCSection>


        <DCSection id="edges"
          title="Reunatapaukset"
          subtitle="Skeleton-loading, ei verkkoa, tyhjä haku, ei kuvaa. Designin vahvuus mitataan tällä.">

          <DCArtboard id="skeleton" label="Skeleton · ensilataus" width={FW} height={FH}>
            <PhoneFrame><SkeletonFeed/></PhoneFrame>
          </DCArtboard>

          <DCArtboard id="no-network" label="Ei verkkoa" width={FW} height={FH}>
            <PhoneFrame><NoNetworkFeed/></PhoneFrame>
          </DCArtboard>

          <DCArtboard id="empty" label="Tyhjä haku · Tapahtuma" width={FW} height={FH}>
            <PhoneFrame><EmptyFeed/></PhoneFrame>
          </DCArtboard>

          <DCArtboard id="no-image" label="Kortti · ei kuvaa" width={260} height={350}>
            <div style={{padding: 20, height: 310, display: "flex", alignItems: "center", justifyContent: "center", background: "var(--background)"}}>
              <NoImageCard/>
            </div>
          </DCArtboard>
        </DCSection>

      </DesignCanvas>
    );
  }

  function FeedV3Demo({ filter }) {
    const ref = React.useRef(null);
    React.useEffect(() => {
      if (!filter || !ref.current) return;
      const labels = { lainaa: "Lainaa", tarjoan: "Tarjoan", tarvitsen: "Tarvitsen", ilmaista: "Ilmaista", tapahtuma: "Tapahtuma" };
      const target = labels[filter];
      const t = setTimeout(() => {
        const els = ref.current?.querySelectorAll("div") || [];
        for (const el of els) {
          if (el.textContent?.startsWith(target) && el.offsetHeight === 36) {
            el.click(); break;
          }
        }
      }, 50);
      return () => clearTimeout(t);
    }, [filter]);
    return <div ref={ref} style={{height: "100%"}}><FeedV3 active="feed"/></div>;
  }

  ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
